<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}AI Resume Analyzer{% endblock %}</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <!-- Loading Screen Overlay -->
    <div id="loadingScreen" class="hidden">
      <div class="spinner"></div>
      <h3 class="loading-text">Analyzing Your Resume</h3>
      <p class="loading-subtext">Our AI is extracting skills and scanning for ATS compatibility...</p>
    </div>

    <!-- Floating Background -->

    <div class="background">
      <span class="circle one"></span>

      <span class="circle two"></span>

      <span class="circle three"></span>
    </div>

    <!-- Navbar -->

    <header>
      <nav class="navbar">
        <div class="logo">
          <div class="logo-box">AI</div>

          <h2>Resume Analyzer</h2>
        </div>

        {% block nav_right %}{% endblock %}
      </nav>
    </header>

    <!-- Main -->

    <main>{% block content %} {% endblock %}</main>

    <!-- Footer -->

    <footer>
      <div class="footer-content">
        <h3>AI Resume Analyzer</h3>

        <p>Built with Python • Flask • Gemini AI</p>

        <small> Developed by Chetan & Rajkumar </small>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
